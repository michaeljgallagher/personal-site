<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/tailwind.css" />
  <script>(function(){try{var s=localStorage.getItem('theme');var d=s?s==='dark':window.matchMedia('(prefers-color-scheme: dark)').matches;if(d)document.documentElement.classList.add('dark');}catch(e){}})();</script>
</head>
<body class="min-h-full bg-ink-50 text-ink-900 antialiased dark:bg-ink-950 dark:text-ink-100">
  <div class="mx-auto flex min-h-screen max-w-3xl flex-col items-center justify-center px-6 text-center">
    <p class="text-sm font-medium uppercase tracking-widest text-accent-500 dark:text-accent-400">404</p>
    <h1 class="mt-3 text-4xl font-semibold tracking-tight">Page not found</h1>
    <p class="mt-3 text-ink-600 dark:text-ink-400">The page you are looking for doesn't exist.</p>
    <a href="/" class="mt-6 inline-flex items-center justify-center rounded-md bg-accent-500 px-4 py-2 text-sm font-medium text-white shadow-sm transition-colors hover:bg-accent-600 dark:bg-accent-400 dark:text-ink-950 dark:hover:bg-accent-300">Return home</a>
  </div>
</body>
</html>
