<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block page_title %}{{ title }}{% endblock %}</title>
  <meta name="description" content="Michael Gallagher — software engineer, mathematician, cyclist." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/tailwind.css" />
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        var dark = saved
          ? saved === 'dark'
          : window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (dark) document.documentElement.classList.add('dark');
      } catch (e) {}
    })();
  </script>
</head>
<body class="min-h-full bg-ink-50 text-ink-900 antialiased dark:bg-ink-950 dark:text-ink-100">
  <div class="mx-auto flex min-h-screen max-w-3xl flex-col px-6 sm:px-8">
    <header class="flex items-center justify-end py-6">
      <button id="theme-toggle" type="button" aria-label="Toggle theme"
        class="inline-flex h-8 w-8 items-center justify-center rounded-md border border-ink-300 text-ink-600 transition-colors hover:border-accent-500 hover:text-accent-500 dark:border-ink-700 dark:text-ink-400 dark:hover:border-accent-400 dark:hover:text-accent-400">
        <svg class="hidden h-4 w-4 dark:block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg class="h-4 w-4 dark:hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </header>

    <main class="flex-1 py-10 sm:py-14">
      {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-ink-200 py-6 text-sm text-ink-500 dark:border-ink-800 dark:text-ink-500">
      <p>&copy; 2026 Michael Gallagher</p>
    </footer>
  </div>

  <div id="orb" class="orb" aria-hidden="true"></div>
  <script src="/static/orb.js" defer></script>

  <script>
    (function () {
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;
      btn.addEventListener('click', function () {
        var dark = document.documentElement.classList.toggle('dark');
        try { localStorage.setItem('theme', dark ? 'dark' : 'light'); } catch (e) {}
      });
    })();
  </script>
</body>
</html>
